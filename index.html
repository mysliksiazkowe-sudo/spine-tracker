<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Spine Analyzer</title>
    <style>
        body { margin: 0; background: #0f172a; color: #f8fafc; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #header { padding: 20px; text-align: center; background: #1e293b; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        #container { display: flex; flex: 1; justify-content: space-around; align-items: center; padding: 20px; }
        .view-box { background: #1e293b; border-radius: 12px; padding: 20px; width: 45%; height: 80%; position: relative; border: 1px solid #334155; }
        canvas { width: 100%; height: 100%; border-bottom: 2px solid #475569; }
        .label { position: absolute; top: 10px; left: 10px; font-weight: bold; color: #94a3b8; }
        #stats { display: flex; justify-content: center; gap: 20px; padding: 20px; background: #1e293b; }
        .stat-card { padding: 15px; border-radius: 8px; background: #0f172a; min-width: 150px; text-align: center; }
        .value { font-size: 24px; font-weight: bold; display: block; margin-top: 5px; }
        .safe { color: #22c55e; } .warning { color: #ef4444; }
        button { padding: 12px 24px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<div id="header">
    <h1>Spine Analyzer Pro</h1>
    <button id="connectBtn">Uruchom Skanowanie</button>
    <div id="status">Czekam na połączenie...</div>
</div>

<div id="container">
    <div class="view-box">
        <div class="label">WIDOK BOCZNY (Lordoza/Kifoza)</div>
        <canvas id="sideView"></canvas>
    </div>
    <div class="view-box">
        <div class="label">WIDOK TYLNY (Skolioza)</div>
        <canvas id="rearView"></canvas>
    </div>
</div>

<div id="stats">
    <div class="stat-card">Kifoza Piersiowa<span id="kifVal" class="value">0°</span></div>
    <div class="stat-card">Lordoza Lędźwiowa<span id="lorVal" class="value">0°</span></div>
    <div class="stat-card">Skolioza<span id="skoVal" class="value">0°</span></div>
</div>

<script>
const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
const CHAR_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

let angles = { 0: {p:0, r:0}, 1: {p:0, r:0}, 2: {p:0, r:0} };

async function connectBLE() {
    try {
        const device = await navigator.bluetooth.requestDevice({
            acceptAllDevices: true,
            optionalServices: [SERVICE_UUID]
        });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        const characteristic = await service.getCharacteristic(CHAR_UUID);
        
        document.getElementById('status').innerText = "Połączono!";
        characteristic.startNotifications();
        characteristic.addEventListener('characteristicvaluechanged', (e) => {
            const raw = new TextDecoder().decode(e.target.value);
            parseData(raw);
            drawSpine();
        });
    } catch (err) { console.log(err); }
}

function parseData(data) {
    data.split(';').forEach(p => {
        if(!p.includes(':')) return;
        const [id, vals] = p.split(':');
        const [w, x, y, z] = vals.split(',').map(Number);
        
        // Konwersja Quaternion -> Euler (uproszczona dla Pitch/Roll)
        angles[id].p = Math.atan2(2.0 * (w*x + y*z), 1.0 - 2.0 * (x*x + y*y)) * 180 / Math.PI;
        angles[id].r = Math.asin(2.0 * (w*y - z*x)) * 180 / Math.PI;
    });
}

function drawView(canvasId, type) {
    const canvas = document.getElementById(canvasId);
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "#3b82f6"; ctx.lineWidth = 8; ctx.lineCap = "round";

    let x = canvas.width / 2;
    let y = canvas.height * 0.8;
    const segLen = canvas.height * 0.25;

    ctx.beginPath(); ctx.moveTo(x, y);

    // --- Sekcja pętli for wewnątrz funkcji drawView(...) ---
for(let i=0; i<3; i++) {

    let angle = (type === 'side') ? angles[i].p : angles[i].r;
    let rad = angle * Math.PI / 180; 

    if (type === 'side') {
        x += Math.sin(rad) * segLen;
        y += Math.cos(rad) * segLen;
    } else {
        x += Math.cos(rad) * segLen;
        y += Math.sin(rad) * segLen;
    }
    ctx.lineTo(x, y);
    ctx.fillStyle = "#fff"; ctx.fillRect(x-4, y-4, 8, 8);
}
    ctx.stroke();
}

function drawSpine() {
    drawView('sideView', 'side');
    drawView('rearView', 'rear');

    // Obliczanie różnic (kątów relatywnych)
    let kifoza = Math.abs(angles[2].p - angles[1].p).toFixed(1);
    let lordoza = Math.abs(angles[1].p - angles[0].p).toFixed(1);
    let skolioza = Math.max(Math.abs(angles[0].r - angles[1].r), Math.abs(angles[1].r - angles[2].r)).toFixed(1);

    updateStat('kifVal', kifoza, 45);
    updateStat('lorVal', lordoza, 50);
    updateStat('skoVal', skolioza, 10);
}

function updateStat(id, val, limit) {
    const el = document.getElementById(id);
    el.innerText = val + "°";
    el.className = "value " + (val > limit ? "warning" : "safe");
}

document.getElementById('connectBtn').addEventListener('click', connectBLE);
</script>
</body>
</html>
